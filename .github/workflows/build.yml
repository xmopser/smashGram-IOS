name: CI

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout into canonical directory
        run: |
          sudo mkdir -p /Users/Shared/telegram-ios
          sudo chown -R runner /Users/Shared/telegram-ios
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /Users/Shared/telegram-ios
          cd /Users/Shared/telegram-ios
          git checkout ${{ github.sha }}
          git submodule update --init --recursive --jobs=4 || true

      - name: Fetch missing bazel-rules from original repo
        run: |
          cd /Users/Shared/telegram-ios

          # Проверяем есть ли сабмодули
          MISSING=false
          for dir in apple_support rules_swift rules_xcodeproj rules_apple; do
            if [ ! -f "build-system/bazel-rules/$dir/BUILD" ] && \
               [ ! -f "build-system/bazel-rules/$dir/BUILD.bazel" ] && \
               [ ! -f "build-system/bazel-rules/$dir/WORKSPACE" ]; then
              echo "MISSING: build-system/bazel-rules/$dir"
              MISSING=true
            fi
          done

          if [ "$MISSING" = true ]; then
            echo "Cloning original telegram-ios to get bazel-rules..."
            git clone --depth=1 https://github.com/TelegramMessenger/Telegram-iOS.git /tmp/tg-reference
            cd /tmp/tg-reference
            git submodule update --init --recursive --jobs=4 build-system/bazel-rules/
            
            # Копируем bazel-rules в наш проект
            cp -Rf /tmp/tg-reference/build-system/bazel-rules/. /Users/Shared/telegram-ios/build-system/bazel-rules/
            echo "bazel-rules copied successfully"
            ls -la /Users/Shared/telegram-ios/build-system/bazel-rules/
          else
            echo "All bazel-rules present, skipping"
          fi

      - name: Set active Xcode path
        run: |
          XCODE_VERSION=$(cat /Users/Shared/telegram-ios/versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
          sudo xcode-select -s /Applications/Xcode_$XCODE_VERSION.app/Contents/Developer

      - name: Inject Configuration, Secrets and Custom Metadata
        run: |
          cd /Users/Shared/telegram-ios

          cat << EOF > build-system/appstore-configuration.json
          {
            "bundle_id": "com.smashgram.miokiru",
            "api_id": "${{ secrets.TELEGRAM_API_ID }}",
            "api_hash": "${{ secrets.TELEGRAM_API_HASH }}",
            "team_id": "FAKETEAMID",
            "app_center_id": 0,
            "is_internal_build": "false",
            "is_appstore_build": "false",
            "appstore_id": "0",
            "app_specific_url_scheme": "tgapp",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false
          }
          EOF

          APP_DISPLAY_NAME="smashGram"
          find . -name "Info.plist" | while read f; do
            LC_ALL=C sed -i '' \
              -e 's/<key>CFBundleDisplayName<\/key>[[:space:]]*<string>[^<]*<\/string>/<key>CFBundleDisplayName<\/key><string>'"$APP_DISPLAY_NAME"'<\/string>/g' \
              "$f" 2>/dev/null || true
          done

      - name: Patch fake-codesigning entitlements
        run: |
          cd /Users/Shared/telegram-ios

          find build-system/fake-codesigning -name "*.entitlements" | while read f; do
            if ! grep -q "aps-environment" "$f"; then
              LC_ALL=C sed -i '' \
                's|</dict>|<key>aps-environment</key><string>development</string></dict>|' \
                "$f" 2>/dev/null || true
            fi
          done

          python3 - << 'PYEOF'
          import re

          with open("build-system/Make/Make.py", "r") as f:
              content = f.read()

          content = re.sub(
              r'(aps-environment[^\n]*\n\s*)(sys\.exit\(1\)|raise\s+\w+)',
              r'\1pass  # patched: skip aps-environment check',
              content
          )

          with open("build-system/Make/Make.py", "w") as f:
              f.write(content)

          print("Make.py patched successfully")
          PYEOF

      - name: Build the App
        run: |
          set -x

          SOURCE_DIR=/Users/Shared/telegram-ios
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"

          cd $SOURCE_DIR

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"

          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"

          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs

          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER"

          # Collect IPA
          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/Telegram.ipa; do
            cp "$f" "$OUTPUT_PATH/"
          done

          # Collect dSYM
          mkdir -p build/DSYMs
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/*.dSYM; do
            cp -R "$f" build/DSYMs/
          done
          zip -r "./$OUTPUT_PATH/Telegram.DSYMs.zip" build/DSYMs 1>/dev/null

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_NUMBER }}
          name: Telegram ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          body: |
            🔓 Unsigned build of **smashGram** ${{ env.APP_VERSION }} (`${{ env.BUILD_NUMBER }}`)

            Установка только через сайдлоад (AltStore, Sideloadly, TrollStore и т.д.)
          draft: false
          prerelease: false
          files: |
            /Users/Shared/telegram-ios/build/artifacts/Telegram.ipa
            /Users/Shared/telegram-ios/build/artifacts/Telegram.DSYMs.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

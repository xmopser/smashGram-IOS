name: CI

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: '0'

      - name: Diagnose submodules
        run: |
          set -x
          cd $GITHUB_WORKSPACE
          echo "=== .gitmodules ==="
          cat .gitmodules || echo "❌ .gitmodules missing!"
          echo ""
          echo "=== build-system/bazel-rules/ ==="
          ls -la build-system/bazel-rules/ || echo "❌ bazel-rules folder missing"
          echo ""
          echo "=== git submodule status ==="
          git submodule status || true
          echo ""
          echo "=== rules_apple contents ==="
          ls -la build-system/bazel-rules/rules_apple/ 2>&1 | head -10 || true
          echo ""
          echo "=== rules_swift contents ==="
          ls -la build-system/bazel-rules/rules_swift/ 2>&1 | head -10 || true

      - name: Set active Xcode path
        run: |
          XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
          sudo xcode-select -s /Applications/Xcode_$XCODE_VERSION.app/Contents/Developer

      - name: Create canonical source directory
        run: |
          set -x
          sudo mkdir -p /Users/Shared
          sudo chown -R $(whoami) /Users/Shared
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

          cd /Users/Shared/telegram-ios

          # Пытаемся переинициализировать submodules
          git submodule sync --recursive || true
          git submodule update --init --recursive --force || true

          # Проверка: если submodules всё ещё пусты — клонируем напрямую
          if [ ! -f "build-system/bazel-rules/rules_apple/MODULE.bazel" ] && [ ! -f "build-system/bazel-rules/rules_apple/WORKSPACE" ]; then
            echo "⚠️ rules_apple отсутствует, клонируем напрямую..."
            rm -rf build-system/bazel-rules/rules_apple
            git clone --depth 1 https://github.com/bazelbuild/rules_apple.git build-system/bazel-rules/rules_apple
          fi

          if [ ! -f "build-system/bazel-rules/rules_swift/MODULE.bazel" ] && [ ! -f "build-system/bazel-rules/rules_swift/WORKSPACE" ]; then
            echo "⚠️ rules_swift отсутствует, клонируем напрямую..."
            rm -rf build-system/bazel-rules/rules_swift
            git clone --depth 1 https://github.com/bazelbuild/rules_swift.git build-system/bazel-rules/rules_swift
          fi

          echo "=== Final state of bazel-rules ==="
          ls -la build-system/bazel-rules/

      - name: Inject Configuration, Secrets and Custom Metadata
        run: |
          cd /Users/Shared/telegram-ios

          cat << 'EOF' > build-system/appstore-configuration.json
          {
            "bundle_id": "com.smashgram.miokiru",
            "api_id": ${{ secrets.TELEGRAM_API_ID }},
            "api_hash": "${{ secrets.TELEGRAM_API_HASH }}",
            "team_id": "",
            "app_center_id": "",
            "appstore_id": "",
            "is_internal_build": false,
            "is_appstore_build": false,
            "app_specific_url_scheme": "",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false,
            "additional_app_ids": []
          }
          EOF

          APP_DISPLAY_NAME="smashGram"
          find . -name "Info.plist" -exec sh -c '
            plutil -replace CFBundleDisplayName -string "'"$APP_DISPLAY_NAME"'" "{}"
          ' sh {} \;

          echo "✅ Configuration created:"
          cat build-system/appstore-configuration.json

      - name: Build the App
        run: |
          set -x

          SOURCE_DIR=/Users/Shared/telegram-ios
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"

          cd $SOURCE_DIR

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"

          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"

          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs

          # Патч: убираем жёсткий exit(1) при отсутствии aps-environment
          python3 - <<'PYEOF'
          import pathlib, re
          p = pathlib.Path("build-system/Make/Make.py")
          s = p.read_text()
          new_s, n = re.subn(
              r"if codesigning_data\.aps_environment is None:\s*\n\s*print\([^\n]*\)\s*\n\s*sys\.exit\(1\)",
              'if codesigning_data.aps_environment is None:\n        codesigning_data.aps_environment = "development"',
              s
          )
          p.write_text(new_s)
          print(f"✅ Make.py patched ({n} replacement)")
          PYEOF

          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER"

          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/Telegram.ipa; do
            cp "$f" "$OUTPUT_PATH/"
          done

          mkdir -p build/DSYMs
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/*.dSYM; do
            cp -R "$f" build/DSYMs/
          done
          zip -r "./$OUTPUT_PATH/Telegram.DSYMs.zip" build/DSYMs 1>/dev/null

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: build-${{ env.BUILD_NUMBER }}
          release_name: Telegram ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          body: |
            An unsigned build of Telegram for iOS ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          draft: false
          prerelease: false

      - name: Upload Release IPA
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /Users/Shared/telegram-ios/build/artifacts/Telegram.ipa
          asset_name: Telegram.ipa
          asset_content_type: application/zip

      - name: Upload Release DSYM
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /Users/Shared/telegram-ios/build/artifacts/Telegram.DSYMs.zip
          asset_name: Telegram.DSYMs.zip
          asset_content_type: application/zip
